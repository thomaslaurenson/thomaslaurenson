<svg xmlns='http://www.w3.org/2000/svg' xmlns:xlink='http://www.w3.org/1999/xlink' style='isolation: isolate' viewBox='0 0 650 195' width='650px' height='195px' direction='ltr'>
  <style>
    @keyframes currstreak {
      0% {
        font-size: 3px;
        opacity: 0.2;
      }

      80% {
        font-size: 34px;
        opacity: 1;
      }

      100% {
        font-size: 28px;
        opacity: 1;
      }
    }

    @keyframes fadein {
      0% {
        opacity: 0;
      }

      100% {
        opacity: 1;
      }
    }
  </style>
  <defs>
    <clipPath id='outer_rectangle'>
      <rect width='650' height='195' rx='4.5' />
    </clipPath>
    <mask id='mask_out_ring_behind_fire'>
      <rect width='650' height='195' fill='white' />
      <ellipse id='mask-ellipse' cx='325' cy='47' rx='13' ry='18' fill='black' />
    </mask>
  </defs>
  <g clip-path='url(#outer_rectangle)'>
    <!-- Card background -->
    <g style='isolation: isolate'>
      <rect fill='none' rx='4.5' x='0.5' y='0.5' width='649' height='194' />
    </g>
    <!-- Terminal prompt -->
    <text x='12' y='18' font-family="'Courier New', Courier, monospace" font-size='11' font-weight='400' fill='#557755' style='opacity: 0; animation: fadein 0.5s linear forwards 0.2s'> thomaslaurenson@github:~$ git streak --show --no-weekends </text>
    <!-- Column dividers -->
    <g style='isolation: isolate'>
      <line x1='217' y1='28' x2='217' y2='170' vector-effect='non-scaling-stroke' stroke-width='1' stroke='#1a2e1a' stroke-linejoin='miter' stroke-linecap='square' stroke-miterlimit='3' />
      <line x1='434' y1='28' x2='434' y2='170' vector-effect='non-scaling-stroke' stroke-width='1' stroke='#1a2e1a' stroke-linejoin='miter' stroke-linecap='square' stroke-miterlimit='3' />
    </g>
    <!-- First Contribution column -->
    <g style='isolation: isolate'>
      <g transform='translate(108, 48)'>
        <text x='0' y='32' stroke-width='0' text-anchor='middle' fill='#39ff14' stroke='none' font-family="'Courier New', Courier, monospace" font-weight='700' font-size='28px' style='opacity: 0; animation: fadein 0.5s linear forwards 0.6s'>
          2013
        </text>
      </g>
      <g transform='translate(108, 84)'>
        <text x='0' y='32' stroke-width='0' text-anchor='middle' fill='#c8e6c8' stroke='none' font-family="'Courier New', Courier, monospace" font-weight='400' font-size='14px' style='opacity: 0; animation: fadein 0.5s linear forwards 0.7s'> First Contribution </text>
      </g>
      <g transform='translate(108, 114)'>
        <text x='0' y='32' stroke-width='0' text-anchor='middle' fill='#557755' stroke='none' font-family="'Courier New', Courier, monospace" font-weight='400' font-size='12px' style='opacity: 0; animation: fadein 0.5s linear forwards 0.8s'>
          Mar 17, 2013
        </text>
      </g>
    </g>
    <!-- Current Streak column -->
    <g style='isolation: isolate'>
      <g transform='translate(325, 123)'>
        <text x='0' y='32' stroke-width='0' text-anchor='middle' fill='#39ff14' stroke='none' font-family="'Courier New', Courier, monospace" font-weight='700' font-size='14px' style='opacity: 0; animation: fadein 0.5s linear forwards 0.9s'> Current Streak </text>
      </g>
      <g transform='translate(325, 160)'>
        <text x='0' y='21' stroke-width='0' text-anchor='middle' fill='#557755' stroke='none' font-family="'Courier New', Courier, monospace" font-weight='400' font-size='12px' style='opacity: 0; animation: fadein 0.5s linear forwards 0.9s'>
          -
        </text>
      </g>
      <g mask='url(#mask_out_ring_behind_fire)'>
        <circle cx='325' cy='86' r='40' fill='none' stroke='#39ff14' stroke-width='5' style='opacity: 0; animation: fadein 0.5s linear forwards 0.4s' />
      </g>
      <g transform='translate(325, 34.5)' stroke-opacity='0' style='opacity: 0; animation: fadein 0.5s linear forwards 0.6s'>
        <path d='M -12 -0.5 L 15 -0.5 L 15 23.5 L -12 23.5 L -12 -0.5 Z' fill='none' />
        <path d='M 1.5 0.67 C 1.5 0.67 2.24 3.32 2.24 5.47 C 2.24 7.53 0.89 9.2 -1.17 9.2 C -3.23 9.2 -4.79 7.53 -4.79 5.47 L -4.76 5.11 C -6.78 7.51 -8 10.62 -8 13.99 C -8 18.41 -4.42 22 0 22 C 4.42 22 8 18.41 8 13.99 C 8 8.6 5.41 3.79 1.5 0.67 Z M -0.29 19 C -2.07 19 -3.51 17.6 -3.51 15.86 C -3.51 14.24 -2.46 13.1 -0.7 12.74 C 1.07 12.38 2.9 11.53 3.92 10.16 C 4.31 11.45 4.51 12.81 4.51 14.2 C 4.51 16.85 2.36 19 -0.29 19 Z' fill='#39ff14' stroke-opacity='0' />
      </g>
      <g transform='translate(325, 63)'>
        <text x='0' y='32' stroke-width='0' text-anchor='middle' fill='#39ff14' stroke='none' font-family="'Courier New', Courier, monospace" font-weight='700' font-size='28px' style='animation: currstreak 0.6s linear forwards'>
          0
        </text>
      </g>
    </g>
    <!-- Longest Streak column -->
    <g style='isolation: isolate'>
      <g transform='translate(542, 48)'>
        <text x='0' y='32' stroke-width='0' text-anchor='middle' fill='#39ff14' stroke='none' font-family="'Courier New', Courier, monospace" font-weight='700' font-size='28px' style='opacity: 0; animation: fadein 0.5s linear forwards 1.2s'>
          83
        </text>
      </g>
      <g transform='translate(542, 84)'>
        <text x='0' y='32' stroke-width='0' text-anchor='middle' fill='#c8e6c8' stroke='none' font-family="'Courier New', Courier, monospace" font-weight='400' font-size='14px' style='opacity: 0; animation: fadein 0.5s linear forwards 1.3s'> Longest Streak </text>
      </g>
      <g transform='translate(542, 114)'>
        <text x='0' y='32' stroke-width='0' text-anchor='middle' fill='#557755' stroke='none' font-family="'Courier New', Courier, monospace" font-weight='400' font-size='12px' style='opacity: 0; animation: fadein 0.5s linear forwards 1.4s'>
          Dec 3, 2023 - Feb 23, 2024
        </text>
      </g>
    </g>
  </g>
</svg>
