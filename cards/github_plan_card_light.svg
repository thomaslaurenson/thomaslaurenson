<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 220" width="650px" height="220px" role="img" aria-label="thomaslaurenson's plan">
  <style>
    .prompt {
      font: 400 11px 'Courier New', Courier, monospace;
      fill: #7a9e7a;
    }

    .keyword {
      font: 700 11px 'Courier New', Courier, monospace;
      fill: #1a4d1a;
    }

    .content {
      font: 400 11px 'Courier New', Courier, monospace;
      fill: #2a6e2a;
    }

    .stagger {
      opacity: 0;
      animation: fadein 0.4s ease-in-out forwards;
    }

    @keyframes fadein {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }
  </style>
  <defs>
    <clipPath id="outer_rect">
      <rect width="650" height="220" rx="4.5" />
    </clipPath>
  </defs>
  <g clip-path="url(#outer_rect)">
    <rect fill="none" rx="4.5" x="0.5" y="0.5" width="649" height="219" />
    <!-- Terminal prompt header -->
    <text x="12" y="18" class="prompt">thomaslaurenson@github:~$ cat ~/.plan</text>
    <!-- Plan lines injected by Python -->
    <g transform="translate(12, 44)">
        <g class="stagger" style="animation-delay: 200ms" transform="translate(0, 0)">
    <text x="0" y="0" class="keyword">BUILDING</text>
    <text x="110" y="0" class="content">Security utilities for Linux and OpenStack</text>
  </g>
  <g class="stagger" style="animation-delay: 280ms" transform="translate(0, 22)">
    <text x="0" y="0" class="keyword">BUILDING</text>
    <text x="110" y="0" class="content">C++ utility apps for vanilla World of Warcraft</text>
  </g>
  <g class="stagger" style="animation-delay: 360ms" transform="translate(0, 44)">
    <text x="0" y="0" class="keyword">HACKING</text>
    <text x="110" y="0" class="content">Binary differencing algorithms reversing</text>
  </g>
  <g class="stagger" style="animation-delay: 440ms" transform="translate(0, 66)">
    <text x="0" y="0" class="keyword">HACKING</text>
    <text x="110" y="0" class="content">Escaping highly restricted egress environments</text>
  </g>
  <g class="stagger" style="animation-delay: 520ms" transform="translate(0, 88)">
    <text x="0" y="0" class="keyword">PLAYING</text>
    <text x="110" y="0" class="content">Torchlight II</text>
  </g>
  <g class="stagger" style="animation-delay: 600ms" transform="translate(0, 110)">
    <text x="0" y="0" class="keyword">READING</text>
    <text x="110" y="0" class="content">The Good Guys Series by Eric Ugland</text>
  </g>
  <g class="stagger" style="animation-delay: 680ms" transform="translate(0, 132)">
    <text x="0" y="0" class="keyword">LISTENING</text>
    <text x="110" y="0" class="content">Tool - Lateralus</text>
  </g>
  <g class="stagger" style="animation-delay: 760ms" transform="translate(0, 154)">
    <text x="0" y="0" class="keyword">EATING</text>
    <text x="110" y="0" class="content">Jazzed up Shin Ramyun Black</text>
  </g>
    </g>
  </g>
</svg>
