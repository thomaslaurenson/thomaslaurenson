<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 220" width="650px" height="220px" role="img" aria-label="GitHub Activity Feed">
  <style>
    .prompt {
      font: 400 11px 'Courier New', Courier, monospace;
      fill: #7a9e7a;
    }

    .log-time {
      font: 400 11px 'Courier New', Courier, monospace;
      fill: #7a9e7a;
    }

    .log-repo {
      font: 400 11px 'Courier New', Courier, monospace;
      fill: #1a4d1a;
    }

    .log-msg {
      font: 400 11px 'Courier New', Courier, monospace;
      fill: #2a6e2a;
    }

    .stagger {
      opacity: 0;
      animation: fadein 0.4s ease-in-out forwards;
    }

    @keyframes fadein {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }
  </style>
  <!--
    TODO: when conventional commits are adopted (feat:, fix:, chore:, docs:),
    colour the commit prefix differently to the message body using SVG tspan elements.
  -->
  <defs>
    <clipPath id="outer_rect">
      <rect width="650" height="220" rx="4.5" />
    </clipPath>
  </defs>
  <g clip-path="url(#outer_rect)">
    <rect fill="none" rx="4.5" x="0.5" y="0.5" width="649" height="219" />
    <!-- Terminal prompt header -->
    <text x="12" y="18" class="prompt">thomaslaurenson@github:~$ git log --all --oneline</text>
    <!-- Log lines injected by Python (_build_log_lines_svg) -->
    <g transform="translate(12, 44)">
        <g class="stagger" style="animation-delay: 200ms" transform="translate(0, 0)">
    <text x="0"   y="0" class="log-time">[3h ago]</text>
    <text x="78"  y="0" class="log-repo">thomaslaurenson/letsblaze</text>
    <text x="357" y="0" class="log-msg">Improve nav and breadcrumb dividers</text>
  </g>
  <g class="stagger" style="animation-delay: 280ms" transform="translate(0, 22)">
    <text x="0"   y="0" class="log-time">[3h ago]</text>
    <text x="78"  y="0" class="log-repo">thomaslaurenson/letsblaze</text>
    <text x="357" y="0" class="log-msg">Incresed font size and tidied hugo conf...</text>
  </g>
  <g class="stagger" style="animation-delay: 360ms" transform="translate(0, 44)">
    <text x="0"   y="0" class="log-time">[6h ago]</text>
    <text x="78"  y="0" class="log-repo">thomaslaurenson/narc</text>
    <text x="357" y="0" class="log-msg">Refactor/windows support and fixes (#17)</text>
  </g>
  <g class="stagger" style="animation-delay: 440ms" transform="translate(0, 66)">
    <text x="0"   y="0" class="log-time">[6h ago]</text>
    <text x="78"  y="0" class="log-repo">thomaslaurenson/narc</text>
    <text x="357" y="0" class="log-msg">Updated changelog, added README badges</text>
  </g>
  <g class="stagger" style="animation-delay: 520ms" transform="translate(0, 88)">
    <text x="0"   y="0" class="log-time">[1d ago]</text>
    <text x="78"  y="0" class="log-repo">thomaslaurenson/pass-env</text>
    <text x="357" y="0" class="log-msg">Refactor/testing updates (#21)</text>
  </g>
  <g class="stagger" style="animation-delay: 600ms" transform="translate(0, 110)">
    <text x="0"   y="0" class="log-time">[1d ago]</text>
    <text x="78"  y="0" class="log-repo">thomaslaurenson/pass-env</text>
    <text x="357" y="0" class="log-msg">Bumped to version 0.2.0</text>
  </g>
  <g class="stagger" style="animation-delay: 680ms" transform="translate(0, 132)">
    <text x="0"   y="0" class="log-time">[2d ago]</text>
    <text x="78"  y="0" class="log-repo">TheGrayDot/mpqcli</text>
    <text x="357" y="0" class="log-msg">Refactor/bug fixing 1 (#153)</text>
  </g>
  <g class="stagger" style="animation-delay: 760ms" transform="translate(0, 154)">
    <text x="0"   y="0" class="log-time">[2d ago]</text>
    <text x="78"  y="0" class="log-repo">TheGrayDot/mpqcli</text>
    <text x="357" y="0" class="log-msg">Fix test extract path error on Windows</text>
  </g>
    </g>
  </g>
</svg>
