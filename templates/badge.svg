<svg xmlns="http://www.w3.org/2000/svg" width="{{total_width}}" height="20" viewBox="0 0 {{total_width}} 20" role="img">
  <defs>
    <clipPath id="badge-clip">
      <rect width="{{total_width}}" height="20" rx="4" />
    </clipPath>
  </defs>
  <!-- Background sections -->
  <g clip-path="url(#badge-clip)">
    <rect width="{{label_width}}" height="20" fill="{{label_bg}}" />
    <rect x="{{label_width}}" width="{{value_width}}" height="20" fill="{{value_bg}}" />
  </g>
  <!-- Icon (left side, inlined from icons/ directory) -->
  <g transform="translate(5, 3) scale(0.58)" {{icon_group_attrs}}>
    {{icon_paths}}
  </g>
  <!-- Label text (left side) -->
  <text x="{{label_text_x}}" y="14" font-family="'Courier New', Courier, monospace" font-size="11" fill="{{label_text_color}}">{{label}}</text>
  <!-- Value text (right side) -->
  <text x="{{value_text_x}}" y="14" font-family="'Courier New', Courier, monospace" font-size="11" fill="{{value_text_color}}">{{value}}</text>
</svg>
